# Fly.io deployment config for the Express backend.
#
# SETUP:
#   1. Install flyctl: https://fly.io/docs/hands-on/install-flyctl/
#   2. From this directory: fly launch --no-deploy (links the app, skips first deploy)
#   3. Set secrets — these hold real values and are NEVER committed to git:
#
#        fly secrets set \
#          DATABASE_URL="postgresql://user:pass@host/db?sslmode=require" \
#          JWT_SECRET="$(openssl rand -hex 32)" \
#          ALLOWED_ORIGINS="https://your-app.vercel.app"
#
#   4. Deploy: fly deploy
#
# MIGRATIONS run automatically before each deploy via release_command below.

app            = "REPLACE_WITH_YOUR_APP_NAME"
primary_region = "iad"

[build]

# Non-sensitive config only. Secrets (DATABASE_URL, JWT_SECRET, ALLOWED_ORIGINS)
# must be set via `fly secrets set` — never put real values in this file.
[env]
  NODE_ENV = "production"
  PORT     = "8080"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = true
  auto_start_machines  = true
  min_machines_running = 1

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

# Runs `node db/migrate.js` against the production DB before the new VM goes live.
# If migrations fail the deploy is aborted — no partial rollout with a mismatched schema.
[deploy]
  release_command = "node db/migrate.js"
