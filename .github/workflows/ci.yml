# Runs the full integration test suite on every push and pull request to main.
#
# IMPORTANT: After enabling this workflow, turn on branch protection in GitHub:
#   Settings → Branches → Add rule → require "CI / test" to pass before merge.
#   This ensures no code reaches main without passing tests.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fittrack
          POSTGRES_PASSWORD: fittrack
          POSTGRES_DB: fittrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run migrations
        run: node db/migrate.js
        working-directory: server
        env:
          DATABASE_URL: postgresql://fittrack:fittrack@localhost:5432/fittrack_test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Run tests
        run: npm test
        working-directory: server
        env:
          DATABASE_URL: postgresql://fittrack:fittrack@localhost:5432/fittrack_test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          NODE_ENV: test
