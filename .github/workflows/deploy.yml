name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fittrack
          POSTGRES_PASSWORD: fittrack
          POSTGRES_DB: fittrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Run migrations
        run: node db/migrate.js
        working-directory: server
        env:
          DATABASE_URL: postgresql://fittrack:fittrack@localhost:5432/fittrack_test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          NODE_ENV: test

      - name: Run tests
        run: npm test
        working-directory: server
        env:
          DATABASE_URL: postgresql://fittrack:fittrack@localhost:5432/fittrack_test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          NODE_ENV: test

  deploy:
    name: Deploy backend
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        working-directory: server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
